<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Visor Urbano Paraná - Corrección Etiquetas</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/leaflet-textpath@1.2.3/leaflet.textpath.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { margin:0; padding:0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; background: #fff; }
        
        .panel-superior {
            position: absolute; top: 15px; left: 60px; z-index: 2000;
            background: white; padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; gap: 10px;
        }

        .etiqueta-distrito {
            background: rgba(255, 255, 255, 0.8) !important;
            border: 1.5px solid #d35400 !important;
            border-radius: 4px !important;
            padding: 2px 5px !important;
            font-size: 11px !important;
            font-weight: bold !important;
            color: #d35400 !important;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="panel-superior">
        <input type="text" id="input-pm" placeholder="Partida Municipal" style="width:140px; padding:6px;">
        <button onclick="buscarPM()" style="padding:6px 12px; background:#2c3e50; color:white; border:none; border-radius:4px; cursor:pointer;">Buscar</button>
        <select id="filtro-distrito" onchange="filtrarDistritos()" style="padding:6px;">
            <option value="todos">-- Todos los Distritos --</option>
        </select>
    </div>

    <div id="map"></div>

    <script>
        const BASE_URL = "https://bruno-otalora.github.io/Cartograf-a/";

        function getColor(d) {
            var colors = ['#e6194b', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#46f0f0', '#f032e6', '#fabebe', '#008080'];
            var hash = 0; if (!d) return '#ccc';
            for (var i = 0; i < d.length; i++) { hash = d.charCodeAt(i) + ((hash << 5) - hash); }
            return colors[Math.abs(hash) % colors.length];
        }

        var map = L.map('map', {
            center: [-31.738, -60.525],
            zoom: 14,
            preferCanvas: true 
        });

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        var satelitalBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        var etiquetasEsri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}');
        
        var satelitalHibrido = L.layerGroup([satelitalBase, etiquetasEsri]).addTo(map);

        var lyDistritos;
        fetch(BASE_URL+"distritos.geojson").then(r=>r.json()).then(data=>{
            lyDistritos = L.geoJSON(data, {
                style: function(f) { return { fillColor: getColor(f.properties.distrito), weight: 2.5, color: 'white', fillOpacity: 0.4 }; },
                onEachFeature: function(f, l) {
                    if (f.properties.distrito) {
                        l.bindTooltip(f.properties.distrito, { permanent: true, direction: "center", className: 'etiqueta-distrito', opacity: 0.9 });
                        var sel = document.getElementById('filtro-distrito');
                        if (!Array.from(sel.options).some(o => o.value === f.properties.distrito)) {
                            var opt = document.createElement('option'); opt.value = f.properties.distrito; opt.text = f.properties.distrito; sel.add(opt);
                        }
                    }
                }
            }).addTo(map);
        });

        fetch(BASE_URL+"manzana.geojson").then(r=>r.json()).then(data=>{
            L.geoJSON(data, {style: { color: "#555", weight: 0.2, fillOpacity: 0.01 }}).addTo(map);
        });

        var lyCalles;
        fetch(BASE_URL+"calles.geojson").then(r=>r.json()).then(data=>{
            lyCalles = L.geoJSON(data, {
                style: { color: "#333", weight: 2, opacity: 0.6 },
                onEachFeature: function (f, l) {
                    if (f.properties.nombre) {
                        l.bindPopup("<b>Calle:</b> " + f.properties.nombre);
                        l.bindTooltip(f.properties.nombre, { sticky: true });
                    }
                }
            }).addTo(map);
        });

        function actualizarEtiquetasCalles() {
            var zoom = map.getZoom();
            var mostrarTexto = map.hasLayer(osm);
            if (!lyCalles) return;

            lyCalles.eachLayer(function(layer) {
                layer.setText(null); 
                if (mostrarTexto && zoom >= 16 && layer.feature.properties.nombre) {
                    layer.setText(layer.feature.properties.nombre, {
                        repeat: true,
                        offset: -10,
                        attributes: { fill: '#222', 'font-size': '13px', 'font-weight': 'bold' }
                    });
                }
            });
        }

        var parcelasLayers = [];
        var grupoParcelas = L.layerGroup();

        ["parcela1_5.geojson","parcela6_9.geojson","parcela10_15.geojson"].forEach(nombre=>{
            fetch(BASE_URL+nombre).then(r=>r.json()).then(data=>{
                var layer = L.geoJSON(data, {
                    style: { color: "#2980b9", weight: 0.6, fillOpacity: 0.1 },
                    onEachFeature: function(f, l) { if (f.properties.nropasd) l.bindPopup("<b>Partida:</b> " + f.properties.nropasd); }
                });
                parcelasLayers.push(layer);
                grupoParcelas.addLayer(layer);
            });
        });

        map.on('zoomend baselayerchange', function() {
            actualizarEtiquetasCalles();
            
            if (map.getZoom() >= 17) {
                parcelasLayers.forEach(l=>{ if (!map.hasLayer(l)) map.addLayer(l); });
            } else {
                parcelasLayers.forEach(l=>{ if (map.hasLayer(l)) map.removeLayer(l); });
            }
        });

        L.Control.geocoder({ position: 'topright', placeholder: "Buscar dirección..." }).addTo(map);

        function buscarPM() {
            var val = document.getElementById('input-pm').value.trim();
            var encontrada = false;

            parcelasLayers.forEach(layer=>{
                layer.eachLayer(function(l) {
                    if (l.feature.properties.nropasd == val) {
                        map.fitBounds(l.getBounds());
                        if (!map.hasLayer(layer)) map.addLayer(layer);
                        l.openPopup();
                        encontrada = true;
                    }
                });
            });

            if (!encontrada) alert("Partida no encontrada");
        }

        function filtrarDistritos() {
            var val = document.getElementById('filtro-distrito').value;
            if (!lyDistritos) return;

            lyDistritos.eachLayer(function(l) {
                var visible = (val === "todos" || l.feature.properties.distrito === val);
                l.setStyle({ opacity: visible ? 1 : 0, fillOpacity: visible ? 0.4 : 0 });
                if (l.getTooltip()) l.getTooltip().setOpacity(visible ? 0.9 : 0);
            });
        }

        var grupoDistritos = L.layerGroup().addTo(map);
        var grupoCalles = L.layerGroup().addTo(map);

        L.control.layers({ 
            "Híbrido (Satélite + Nombres)": satelitalHibrido, 
            "Calles (Plano OSM)": osm 
        }, { 
            "Distritos": grupoDistritos, 
            "Calles (Ejes)": grupoCalles,
            "Parcelas": grupoParcelas
        }).addTo(map);

        setTimeout(actualizarEtiquetasCalles, 500);

    </script>
</body>
</html>
