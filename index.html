<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Visor Urbano Paraná - Corrección Etiquetas</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/leaflet-textpath@1.2.3/leaflet.textpath.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { margin:0; padding:0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; background: #fff; }
        
        .panel-superior {
            position: absolute; top: 15px; left: 60px; z-index: 2000;
            background: white; padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; gap: 10px;
        }

        .etiqueta-distrito {
            background: rgba(255, 255, 255, 0.8) !important;
            border: 1.5px solid #d35400 !important;
            border-radius: 4px !important;
            padding: 2px 5px !important;
            font-size: 11px !important;
            font-weight: bold !important;
            color: #d35400 !important;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="panel-superior">
    <input type="text" id="input-pm" placeholder="Partida Municipal">
    <button onclick="buscarPM()">Buscar</button>
    <select id="filtro-distrito" onchange="filtrarDistritos()">
        <option value="todos">-- Todos los Distritos --</option>
    </select>
</div>

<div id="map"></div>

<script>
const BASE_URL = "https://bruno-otalora.github.io/Cartograf-a/";

var map = L.map('map',{center:[-31.738,-60.525],zoom:14});

var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
var ref = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}');
var hibrido = L.layerGroup([sat,ref]).addTo(map);

/* ================= EXISTENTE ================= */

var grupoDistritos = L.layerGroup().addTo(map);
var grupoCalles = L.layerGroup().addTo(map);
var grupoParcelas = L.layerGroup();

/* ================= NUEVAS CAPAS ================= */

var grupoUrbanizaciones = L.layerGroup();
var grupoIAPV = L.layerGroup();
var grupoPresTotal = L.layerGroup();
var grupoPresFachadas = L.layerGroup();

// Urbanizaciones
fetch("https://raw.githubusercontent.com/dcartografiayde/IDE-PARANA/main/loteos.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:{color:"#d35400",fillColor:"#e67e22",fillOpacity:0.5,weight:2}
    }).addTo(grupoUrbanizaciones);
});

// IAPV
fetch("https://raw.githubusercontent.com/dcartografiayde/IDE-PARANA/main/iapv.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:{color:"#1e8449",fillColor:"#2ecc71",fillOpacity:0.5,weight:2}
    }).addTo(grupoIAPV);
});

// Preservación Total
fetch("https://raw.githubusercontent.com/dcartografiayde/IDE-PARANA/main/preservacion_total.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:{color:"#8e44ad",fillColor:"#9b59b6",fillOpacity:0.5,weight:2}
    }).addTo(grupoPresTotal);
});

// Preservación Fachadas
fetch("https://raw.githubusercontent.com/dcartografiayde/IDE-PARANA/main/preservacion_fachadas.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:{color:"#c0392b",fillColor:"#e74c3c",fillOpacity:0.5,weight:2}
    }).addTo(grupoPresFachadas);
});

/* ================= CONTROL ================= */

L.control.layers(
{
    "Híbrido": hibrido,
    "OSM": osm
},
{
    "Distritos": grupoDistritos,
    "Calles": grupoCalles,
    "Parcelas": grupoParcelas,
    "Urbanizaciones": grupoUrbanizaciones,
    "Loteos IAPV": grupoIAPV,
    "Preservación Total": grupoPresTotal,
    "Preservación de fachadas": grupoPresFachadas
}
).addTo(map);

</script>
</body>
</html>
