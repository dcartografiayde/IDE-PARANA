<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Visor Urbano Paraná - GitHub OK</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/leaflet-textpath@1.2.3/leaflet.textpath.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<style>
body { margin:0; padding:0; font-family: 'Segoe UI', sans-serif; }
#map { height: 100vh; width: 100%; }

.panel-superior {
    position: absolute; top: 15px; left: 60px; z-index: 2000;
    background: white; padding: 12px; border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; gap: 10px;
}
</style>
</head>
<body>

<div class="panel-superior">
    <input type="text" id="input-pm" placeholder="Parcela..." style="width:140px; padding:6px;">
    <button onclick="buscarPM()">Buscar</button>
</div>

<div id="map"></div>

<script>

const BASE_URL = "https://bruno-otalora.github.io/Cartograf-a/";

var map = L.map('map',{center:[-31.738,-60.525],zoom:14});

// 🔥 CAMBIO: usar ESRI (evita error 403 OSM)
L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

var parcelasLayers = [];

// =====================
// DISTRITOS
// =====================
// =====================
// DISTRITOS (con estilo + etiquetas dinámicas)
// =====================

function getColor(d) {
    var colors = ['#e6194b','#3cb44b','#ffe119','#4363d8','#f58231','#911eb4','#46f0f0','#f032e6','#bcf60c','#fabebe'];
    var hash = 0;
    if (!d) return '#ccc';
    for (var i = 0; i < d.length; i++) {
        hash = d.charCodeAt(i) + ((hash << 5) - hash);
    }
    return colors[Math.abs(hash) % colors.length];
}

var distritosLayer;

fetch(BASE_URL + "distritos.geojson")
.then(r=>r.json())
.then(data=>{

    distritosLayer = L.geoJSON(data,{
        style: function(f){
            return {
                fillColor: getColor(f.properties.distrito),
                weight: 2,
                color: "#ffffff",
                fillOpacity: 0.35
            };
        },
        onEachFeature: function(f,l){

            if(f.properties.distrito){

                l.bindTooltip(f.properties.distrito,{
                    permanent: false,
                    direction: "center",
                    className: "etiqueta-distrito"
                });

                // Mostrar etiqueta solo si está visible
                l.on('add', function(){
                    if(map.getZoom() >= 13){
                        l.openTooltip();
                    }
                });

            }
        }
    }).addTo(map);

});

// Control dinámico de etiquetas según zoom
map.on('zoomend moveend', function(){

    if(!distritosLayer) return;

    var bounds = map.getBounds();
    var zoom = map.getZoom();

    distritosLayer.eachLayer(function(l){

        var visible = bounds.intersects(l.getBounds());

        if(visible && zoom >= 13){
            if(l.getTooltip()) l.openTooltip();
        } else {
            if(l.getTooltip()) l.closeTooltip();
        }

    });

});

// =====================
// MANZANAS (corregido nombre)
// =====================
fetch(BASE_URL + "manzana.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:{color:"#555",weight:0.3,fillOpacity:0.05}
    }).addTo(map);
});

// =====================
// CALLES
// =====================
fetch(BASE_URL + "calles.geojson")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:{color:"#333",weight:2},
        onEachFeature:(f,l)=>{
            if(f.properties.nombre){
                l.bindPopup(f.properties.nombre);
            }
        }
    }).addTo(map);
});

// =====================
// PARCELAS DIVIDIDAS (SIN .geojson en nombre)
// =====================
function cargarParcelas(){

    const archivos = [
        "parcela1_5.geojson",
        "parcela6_9.geojson",
        "parcela10_15.geojson"
    ];

    archivos.forEach(nombre=>{
        fetch(BASE_URL + nombre)
        .then(r=>r.json())
        .then(data=>{
            var layer = L.geoJSON(data,{
                style:{color:"#2980b9",weight:0.5,fillOpacity:0.1},
                onEachFeature:(f,l)=>{
                    if(f.properties.nropasd){
                        l.bindPopup("Parcela: " + f.properties.nropasd);
                    }
                }
            });

            parcelasLayers.push(layer);
        });
    });
}

cargarParcelas();

// =====================
// CONTROL ZOOM
// =====================
map.on("zoomend",()=>{

    if(map.getZoom()>=17){
        parcelasLayers.forEach(l=>{
            if(!map.hasLayer(l)) l.addTo(map);
        });
    }else{
        parcelasLayers.forEach(l=>{
            if(map.hasLayer(l)) map.removeLayer(l);
        });
    }

});

// =====================
// BUSCADOR UNIFICADO
// =====================
function buscarPM(){

    var val = document.getElementById("input-pm").value.trim();
    var encontrada = false;

    parcelasLayers.forEach(layer=>{
        layer.eachLayer(l=>{
            if(l.feature.properties.nropasd == val){
                map.fitBounds(l.getBounds());
                l.openPopup();
                encontrada = true;
            }
        });
    });

    if(!encontrada) alert("Parcela no encontrada");
}

// =====================
// GEOCODER
// =====================
L.Control.geocoder().addTo(map);

</script>

</body>
</html>
